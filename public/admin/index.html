<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Content Manager</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    #cms-container {
      display: none;
      width: 100%;
      height: 100vh;
    }

    #auth-container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 400px;
      width: 100%;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 8px;
      color: #333;
      text-align: center;
    }

    .subtitle {
      color: #666;
      text-align: center;
      margin-bottom: 32px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 12px;
      border: 2px solid #e1e8ed;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .link-button {
      background: none;
      color: #667eea;
      text-decoration: none;
      font-size: 14px;
      padding: 8px 0;
      margin-top: 16px;
      font-weight: 500;
    }

    .link-button:hover {
      transform: none;
      box-shadow: none;
      text-decoration: underline;
    }

    .error-message {
      background: #fee;
      color: #c33;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 14px;
      border-left: 4px solid #c33;
    }

    .success-message {
      background: #efe;
      color: #3c3;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 14px;
      border-left: 4px solid #3c3;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }

    .hidden {
      display: none !important;
    }

    .divider {
      text-align: center;
      margin: 24px 0;
      color: #999;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <!-- Loading State -->
  <div id="loading" class="loading">
    <p>Loading...</p>
  </div>

  <!-- Authentication Container -->
  <div id="auth-container" class="hidden">
    <h1>Love More CMS</h1>
    <p class="subtitle">Content Management System</p>

    <div id="error-container" class="hidden"></div>
    <div id="success-container" class="hidden"></div>

    <!-- Login Form -->
    <form id="login-form" class="hidden">
      <div class="form-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" required autocomplete="current-password" />
      </div>
      <button type="submit" id="login-submit">Log In</button>
      <button type="button" class="link-button" id="show-forgot-password">Forgot password?</button>
    </form>

    <!-- Forgot Password Form -->
    <form id="forgot-password-form" class="hidden">
      <div class="form-group">
        <label for="reset-email">Email</label>
        <input type="email" id="reset-email" required autocomplete="email" />
      </div>
      <button type="submit" id="reset-submit">Send Reset Link</button>
      <button type="button" class="link-button" id="show-login">Back to login</button>
    </form>

    <!-- New Password Form (shown after clicking recovery link) -->
    <form id="new-password-form" class="hidden">
      <div class="form-group">
        <label for="new-password">New Password</label>
        <input type="password" id="new-password" required autocomplete="new-password" minlength="6" />
      </div>
      <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" required autocomplete="new-password" minlength="6" />
      </div>
      <button type="submit" id="password-submit">Set New Password</button>
    </form>
  </div>

  <!-- CMS Container (shown when authenticated) -->
  <div id="cms-container">
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </div>

  <!-- Netlify Identity authentication -->
  <script type="module">
    import {
      handleAuthCallback,
      getUser,
      login,
      logout,
      requestPasswordRecovery,
      recoverPassword
    } from 'https://cdn.jsdelivr.net/npm/@netlify/identity@1/+esm';

    // DOM elements
    const loading = document.getElementById('loading');
    const authContainer = document.getElementById('auth-container');
    const cmsContainer = document.getElementById('cms-container');
    const errorContainer = document.getElementById('error-container');
    const successContainer = document.getElementById('success-container');

    const loginForm = document.getElementById('login-form');
    const forgotPasswordForm = document.getElementById('forgot-password-form');
    const newPasswordForm = document.getElementById('new-password-form');

    let recoveryToken = null;

    // Utility functions
    function showError(message) {
      errorContainer.textContent = message;
      errorContainer.className = 'error-message';
      successContainer.className = 'hidden';
    }

    function showSuccess(message) {
      successContainer.textContent = message;
      successContainer.className = 'success-message';
      errorContainer.className = 'hidden';
    }

    function hideMessages() {
      errorContainer.className = 'hidden';
      successContainer.className = 'hidden';
    }

    function showForm(formId) {
      loginForm.classList.add('hidden');
      forgotPasswordForm.classList.add('hidden');
      newPasswordForm.classList.add('hidden');
      hideMessages();

      document.getElementById(formId).classList.remove('hidden');
    }

    function showCMS() {
      loading.classList.add('hidden');
      authContainer.classList.add('hidden');
      cmsContainer.style.display = 'block';
      document.body.style.background = 'white';
      document.body.style.padding = '0';
    }

    function showAuth() {
      loading.classList.add('hidden');
      authContainer.classList.remove('hidden');
    }

    // Check authentication and handle callbacks
    async function initAuth() {
      try {
        // Check if we were redirected here for password recovery
        const isRecovery = sessionStorage.getItem('netlify_recovery');
        if (isRecovery === 'true') {
          sessionStorage.removeItem('netlify_recovery');
          showAuth();
          showForm('new-password-form');
          return;
        }

        // Handle any callbacks (invite, confirmation, recovery, OAuth)
        const callbackResult = await handleAuthCallback();

        if (callbackResult) {
          console.log('Auth callback:', callbackResult.type);

          // If this is a password recovery callback, show the new password form
          if (callbackResult.type === 'recovery') {
            recoveryToken = callbackResult.token;
            showAuth();
            showForm('new-password-form');
            return;
          }

          // For other callback types (invite, confirmation), user is now logged in
          if (callbackResult.user) {
            showCMS();
            return;
          }
        }

        // Check if user is already logged in
        const user = await getUser();

        if (user) {
          // User is authenticated, show CMS
          showCMS();
        } else {
          // Not authenticated, show login form
          showAuth();
          showForm('login-form');
        }
      } catch (error) {
        console.error('Auth initialization error:', error);
        showAuth();
        showForm('login-form');
        showError('Authentication error. Please try again.');
      }
    }

    // Login form handler
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();

      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const submitBtn = document.getElementById('login-submit');

      try {
        submitBtn.disabled = true;
        submitBtn.textContent = 'Logging in...';

        const user = await login(email, password);

        if (user) {
          showSuccess('Login successful! Loading CMS...');
          setTimeout(() => showCMS(), 1000);
        }
      } catch (error) {
        console.error('Login error:', error);
        showError(error.message || 'Login failed. Please check your credentials.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Log In';
      }
    });

    // Forgot password form handler
    forgotPasswordForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();

      const email = document.getElementById('reset-email').value;
      const submitBtn = document.getElementById('reset-submit');

      try {
        submitBtn.disabled = true;
        submitBtn.textContent = 'Sending...';

        await requestPasswordRecovery(email);

        showSuccess('Password reset email sent! Check your inbox.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Reset Link';

        // Clear the form
        document.getElementById('reset-email').value = '';

        // Show login form after 3 seconds
        setTimeout(() => showForm('login-form'), 3000);
      } catch (error) {
        console.error('Password recovery error:', error);
        showError(error.message || 'Failed to send reset email. Please try again.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Reset Link';
      }
    });

    // New password form handler
    newPasswordForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();

      const newPassword = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const submitBtn = document.getElementById('password-submit');

      if (newPassword !== confirmPassword) {
        showError('Passwords do not match.');
        return;
      }

      if (newPassword.length < 6) {
        showError('Password must be at least 6 characters long.');
        return;
      }

      try {
        submitBtn.disabled = true;
        submitBtn.textContent = 'Setting password...';

        const user = await recoverPassword(newPassword, true);

        if (user) {
          showSuccess('Password reset successful! Redirecting to CMS...');
          setTimeout(() => showCMS(), 1500);
        }
      } catch (error) {
        console.error('Password reset error:', error);
        showError(error.message || 'Failed to reset password. Please try again.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Set New Password';
      }
    });

    // Form navigation
    document.getElementById('show-forgot-password').addEventListener('click', () => {
      showForm('forgot-password-form');
    });

    document.getElementById('show-login').addEventListener('click', () => {
      showForm('login-form');
    });

    // Initialize authentication
    initAuth();
  </script>
</body>
</html>
