<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Content Manager</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    #cms-container {
      display: none;
      width: 100%;
      height: 100vh;
    }

    #auth-container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 400px;
      width: 100%;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 8px;
      color: #333;
      text-align: center;
    }

    .subtitle {
      color: #666;
      text-align: center;
      margin-bottom: 32px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 12px;
      border: 2px solid #e1e8ed;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .link-button {
      background: none;
      color: #667eea;
      text-decoration: none;
      font-size: 14px;
      padding: 8px 0;
      margin-top: 16px;
      font-weight: 500;
    }

    .link-button:hover {
      transform: none;
      box-shadow: none;
      text-decoration: underline;
    }

    .error-message {
      background: #fee;
      color: #c33;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 14px;
      border-left: 4px solid #c33;
    }

    .success-message {
      background: #efe;
      color: #3c3;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 14px;
      border-left: 4px solid #3c3;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }

    .hidden {
      display: none !important;
    }

    .divider {
      text-align: center;
      margin: 24px 0;
      color: #999;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <!-- Loading State -->
  <div id="loading" class="loading">
    <p>Loading...</p>
  </div>

  <!-- Authentication Container -->
  <div id="auth-container" class="hidden">
    <h1>Love More CMS</h1>
    <p class="subtitle">Content Management System</p>

    <div id="error-container" class="hidden" role="alert" aria-live="assertive"></div>
    <div id="success-container" class="hidden" role="status" aria-live="polite"></div>

    <!-- Login Form -->
    <form id="login-form" class="hidden">
      <div class="form-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" required autocomplete="current-password" />
      </div>
      <button type="submit" id="login-submit">Log In</button>
      <button type="button" class="link-button" id="show-forgot-password">Forgot password?</button>
    </form>

    <!-- Forgot Password Form -->
    <form id="forgot-password-form" class="hidden">
      <div class="form-group">
        <label for="reset-email">Email</label>
        <input type="email" id="reset-email" required autocomplete="email" />
      </div>
      <button type="submit" id="reset-submit">Send Reset Link</button>
      <button type="button" class="link-button" id="show-login">Back to login</button>
    </form>

    <!-- New Password Form (shown after clicking recovery link) -->
    <form id="new-password-form" class="hidden">
      <div class="form-group">
        <label for="new-password">New Password</label>
        <input type="password" id="new-password" required autocomplete="new-password" minlength="8" placeholder="At least 8 characters with letters and numbers" />
      </div>
      <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" required autocomplete="new-password" minlength="8" />
      </div>
      <button type="submit" id="password-submit">Set New Password</button>
    </form>
  </div>

  <!-- CMS Container (shown when authenticated) -->
  <div id="cms-container">
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </div>

  <!-- Netlify Identity authentication -->
  <script type="module">
    import {
      handleAuthCallback,
      getUser,
      login,
      logout,
      requestPasswordRecovery,
      recoverPassword
    } from 'https://cdn.jsdelivr.net/npm/@netlify/identity@1/+esm';

    // DOM elements
    const loading = document.getElementById('loading');
    const authContainer = document.getElementById('auth-container');
    const cmsContainer = document.getElementById('cms-container');
    const errorContainer = document.getElementById('error-container');
    const successContainer = document.getElementById('success-container');

    const loginForm = document.getElementById('login-form');
    const forgotPasswordForm = document.getElementById('forgot-password-form');
    const newPasswordForm = document.getElementById('new-password-form');

    let isInRecoveryMode = false;

    // Utility functions
    function showError(message) {
      errorContainer.textContent = message;
      errorContainer.className = 'error-message';
      successContainer.className = 'hidden';
    }

    function showSuccess(message) {
      successContainer.textContent = message;
      successContainer.className = 'success-message';
      errorContainer.className = 'hidden';
    }

    function hideMessages() {
      errorContainer.className = 'hidden';
      successContainer.className = 'hidden';
    }

    function showForm(formId) {
      loginForm.classList.add('hidden');
      forgotPasswordForm.classList.add('hidden');
      newPasswordForm.classList.add('hidden');
      hideMessages();

      const targetForm = document.getElementById(formId);
      targetForm.classList.remove('hidden');

      // Focus management for accessibility
      const firstInput = targetForm.querySelector('input');
      if (firstInput) {
        setTimeout(() => firstInput.focus(), 100);
      }
    }

    function showCMS() {
      loading.classList.add('hidden');
      authContainer.classList.add('hidden');
      cmsContainer.style.display = 'block';
      document.body.style.background = 'white';
      document.body.style.padding = '0';
    }

    function showAuth() {
      loading.classList.add('hidden');
      authContainer.classList.remove('hidden');
    }

    // Check authentication and handle callbacks
    async function initAuth() {
      // Add timeout for hanging auth requests
      const authTimeout = setTimeout(() => {
        if (loading.classList.contains('loading')) {
          showAuth();
          showForm('login-form');
          showError('Authentication check timed out. Please try logging in.');
        }
      }, 10000);

      try {
        // CRITICAL: Check URL hash FIRST before sessionStorage
        // This prevents race condition where refresh loses sessionStorage but keeps URL token
        const hasRecoveryToken = window.location.hash.includes('recovery_token');

        // Handle any callbacks (invite, confirmation, recovery, OAuth)
        const callbackResult = await handleAuthCallback();

        if (callbackResult) {
          // If this is a password recovery callback, show the new password form
          // handleAuthCallback() processes the token and prepares the recovery context
          if (callbackResult.type === 'recovery') {
            clearTimeout(authTimeout);
            isInRecoveryMode = true;
            showAuth();
            showForm('new-password-form');
            return;
          }

          // For other callback types (invite, confirmation, OAuth), user is now logged in
          if (callbackResult.user) {
            clearTimeout(authTimeout);
            showCMS();
            return;
          }
        }

        // Check sessionStorage for recovery redirect (from Layout.astro)
        const isRecoveryRedirect = sessionStorage.getItem('netlify_recovery');
        if (isRecoveryRedirect === 'true' || hasRecoveryToken) {
          sessionStorage.removeItem('netlify_recovery');
          clearTimeout(authTimeout);
          isInRecoveryMode = true;
          showAuth();
          showForm('new-password-form');
          return;
        }

        // Check if user is already logged in
        const user = await getUser();

        clearTimeout(authTimeout);

        if (user) {
          // User is authenticated, show CMS
          showCMS();
        } else {
          // Not authenticated, show login form
          showAuth();
          showForm('login-form');
        }
      } catch (error) {
        clearTimeout(authTimeout);
        showAuth();
        showForm('login-form');

        // User-friendly error messages
        const errorMsg = error.message?.toLowerCase() || '';
        if (errorMsg.includes('network') || errorMsg.includes('fetch')) {
          showError('Connection problem. Please check your internet and try again.');
        } else if (errorMsg.includes('timeout')) {
          showError('Request timed out. Please try again.');
        } else {
          showError('Authentication error. Please try logging in.');
        }
      }
    }

    // Login form handler
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();

      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const submitBtn = document.getElementById('login-submit');

      try {
        submitBtn.disabled = true;
        submitBtn.textContent = 'Logging in...';

        const user = await login(email, password);

        if (user) {
          showSuccess('Login successful! Loading CMS...');
          setTimeout(() => showCMS(), 1000);
        }
      } catch (error) {
        // User-friendly error messages
        const errorMsg = error.message?.toLowerCase() || '';
        let userMessage = 'Login failed. Please check your credentials.';

        if (errorMsg.includes('email') || errorMsg.includes('not found')) {
          userMessage = 'No account found with that email address.';
        } else if (errorMsg.includes('password') || errorMsg.includes('invalid')) {
          userMessage = 'Incorrect password. Please try again.';
        } else if (errorMsg.includes('network') || errorMsg.includes('fetch')) {
          userMessage = 'Connection problem. Please check your internet.';
        } else if (errorMsg.includes('unverified') || errorMsg.includes('confirm')) {
          userMessage = 'Please confirm your email address before logging in.';
        }

        showError(userMessage);
        submitBtn.disabled = false;
        submitBtn.textContent = 'Log In';
      }
    });

    // Forgot password form handler
    forgotPasswordForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();

      const email = document.getElementById('reset-email').value.trim();
      const submitBtn = document.getElementById('reset-submit');

      // Basic email validation
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        showError('Please enter a valid email address.');
        return;
      }

      try {
        submitBtn.disabled = true;
        submitBtn.textContent = 'Sending...';

        await requestPasswordRecovery(email);

        showSuccess('Password reset email sent! Check your inbox and spam folder.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Reset Link';

        // Clear the form
        document.getElementById('reset-email').value = '';
      } catch (error) {
        // User-friendly error messages
        const errorMsg = error.message?.toLowerCase() || '';
        let userMessage = 'Failed to send reset email. Please try again.';

        if (errorMsg.includes('email') || errorMsg.includes('not found')) {
          userMessage = 'If an account exists with that email, a reset link will be sent.';
        } else if (errorMsg.includes('network') || errorMsg.includes('fetch')) {
          userMessage = 'Connection problem. Please check your internet.';
        } else if (errorMsg.includes('rate limit') || errorMsg.includes('too many')) {
          userMessage = 'Too many requests. Please wait a few minutes and try again.';
        }

        showError(userMessage);
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Reset Link';
      }
    });

    // New password form handler
    newPasswordForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();

      const newPassword = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const submitBtn = document.getElementById('password-submit');

      // Validate passwords match
      if (newPassword !== confirmPassword) {
        showError('Passwords do not match.');
        document.getElementById('confirm-password').focus();
        return;
      }

      // Stronger password validation
      if (newPassword.length < 8) {
        showError('Password must be at least 8 characters long.');
        document.getElementById('new-password').focus();
        return;
      }

      if (!/[a-zA-Z]/.test(newPassword) || !/[0-9]/.test(newPassword)) {
        showError('Password must contain both letters and numbers.');
        document.getElementById('new-password').focus();
        return;
      }

      try {
        submitBtn.disabled = true;
        submitBtn.textContent = 'Setting password...';

        // CRITICAL FIX: recoverPassword() uses the recovery context from handleAuthCallback()
        // The token was already processed, we just need to provide the new password
        // The second parameter (true) keeps the user logged in after password reset
        const user = await recoverPassword(newPassword, true);

        if (user) {
          showSuccess('Password reset successful! Redirecting to CMS...');
          isInRecoveryMode = false;
          setTimeout(() => showCMS(), 1500);
        } else {
          throw new Error('Password reset did not return a user');
        }
      } catch (error) {
        // User-friendly error messages
        const errorMsg = error.message?.toLowerCase() || '';
        let userMessage = 'Failed to reset password. Please try again.';

        if (errorMsg.includes('token') || errorMsg.includes('invalid') || errorMsg.includes('expired')) {
          userMessage = 'This password reset link has expired. Please request a new one.';
          setTimeout(() => showForm('forgot-password-form'), 3000);
        } else if (errorMsg.includes('weak') || errorMsg.includes('common')) {
          userMessage = 'This password is too common. Please choose a stronger password.';
        } else if (errorMsg.includes('network') || errorMsg.includes('fetch')) {
          userMessage = 'Connection problem. Please check your internet.';
        }

        showError(userMessage);
        submitBtn.disabled = false;
        submitBtn.textContent = 'Set New Password';
      }
    });

    // Form navigation
    document.getElementById('show-forgot-password').addEventListener('click', () => {
      showForm('forgot-password-form');
    });

    document.getElementById('show-login').addEventListener('click', () => {
      showForm('login-form');
    });

    // Initialize authentication
    initAuth();
  </script>
</body>
</html>
