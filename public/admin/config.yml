backend:
  name: git-gateway
  branch: master # Branch to update (optional; defaults to master)

# Enable editorial workflow for drafts and immediate image preview
publish_mode: editorial_workflow

# Uncomment to use local backend for development
# local_backend: true

media_folder: "public/images/uploads" # Media files will be stored in the repo under public/images/uploads
public_folder: "/images/uploads" # The src attribute for uploaded media will begin with /images/uploads

collections:
  - name: "team"
    label: "Team Members"
    folder: "src/content/team"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Photo", name: "image", widget: "image", hint: "Upload an image. It will appear on the live site after you publish and the site rebuilds (~2 minutes)." }
      - { label: "Display Order", name: "order", widget: "number", default: 100 }
      - { label: "Active", name: "active", widget: "boolean", default: true }
      - { label: "Bio", name: "body", widget: "markdown" }

  - name: "classes"
    label: "Classes"
    folder: "src/content/classes"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Class Name", name: "name", widget: "string" }
      - {
          label: "Type",
          name: "type",
          widget: "select",
          options: ["heated", "non-heated", "specialty"],
        }
      - { label: "Photo", name: "image", widget: "image", hint: "Upload an image. It will appear on the live site after you publish and the site rebuilds (~2 minutes)." }
      - { label: "Display Order", name: "order", widget: "number", default: 100 }
      - { label: "Active", name: "active", widget: "boolean", default: true }
      - { label: "Description", name: "body", widget: "markdown" }

  - name: "retreats"
    label: "Retreats"
    folder: "src/content/retreats"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Retreat Name", name: "name", widget: "string" }
      - { label: "Location", name: "location", widget: "string" }
      - { label: "Photo", name: "image", widget: "image", hint: "Upload an image. It will appear on the live site after you publish and the site rebuilds (~2 minutes)." }
      - { label: "Highlights", name: "highlights", widget: "list" }
      - { label: "Active", name: "active", widget: "boolean", default: true }
      - { label: "Description", name: "body", widget: "markdown" }
