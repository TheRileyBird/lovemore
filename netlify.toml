[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Form submissions
[build.processing]
  skip_processing = false

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://player.vimeo.com https://www.wellnessliving.com https://cdn.isaac.www.wellnessliving.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.isaac.www.wellnessliving.com; font-src 'self' https://fonts.gstatic.com https://cdn.isaac.www.wellnessliving.com; img-src 'self' https: data: blob:; connect-src 'self' blob: data: https://player.vimeo.com https://*.netlify.com https://api.netlify.com https://unpkg.com https://cdn.isaac.www.wellnessliving.com https://*.wellnessliving.com https://app.arketa.co; frame-src 'self' https://player.vimeo.com https://vimeo.com https://www.wellnessliving.com https://cdn.isaac.www.wellnessliving.com https://app.arketa.co; frame-ancestors 'none';"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
